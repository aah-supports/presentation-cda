<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#444"/>
    </marker>
    <style>
      .box { stroke:#333; stroke-width:1.4; rx:4; ry:4; }
      .title { font:700 16px Arial, sans-serif; fill:#111; }
      .txt { font:13px Arial, sans-serif; fill:#222; }
      .edge { stroke:#444; stroke-width:1.6; fill:none; marker-end:url(#arrow); }
      .label { font:12px Arial, sans-serif; fill:#333; }
    </style>
  </defs>

  <rect x="60" y="70" width="250" height="150" class="box" fill="#dae8fc"/>
  <text x="80" y="95" class="title">Product</text>
  <text x="80" y="122" class="txt">- name: string</text>
  <text x="80" y="142" class="txt">- price: number</text>
  <text x="80" y="162" class="txt">- stock: number</text>
  <text x="80" y="182" class="txt">- inCart: number</text>

  <rect x="390" y="50" width="360" height="250" class="box" fill="#fff2cc"/>
  <text x="410" y="75" class="title">&lt;&lt;interface&gt;&gt; IStorage</text>
  <text x="410" y="102" class="txt">+ getProducts()</text>
  <text x="410" y="122" class="txt">+ addCatalogProduct()</text>
  <text x="410" y="142" class="txt">+ addToCart()</text>
  <text x="410" y="162" class="txt">+ removeFromCart()</text>
  <text x="410" y="182" class="txt">+ removeQuantityFromCart()</text>
  <text x="410" y="202" class="txt">+ cancelCart()</text>
  <text x="410" y="222" class="txt">+ checkout()</text>
  <text x="410" y="242" class="txt">+ cartTotal()</text>

  <rect x="820" y="60" width="290" height="130" class="box" fill="#d5e8d4"/>
  <text x="840" y="85" class="title">MemoryStorage</text>
  <text x="840" y="112" class="txt">- products: Product[]</text>
  <text x="840" y="132" class="txt">implements IStorage</text>

  <rect x="820" y="220" width="290" height="130" class="box" fill="#d5e8d4"/>
  <text x="840" y="245" class="title">PostgresStorage</text>
  <text x="840" y="272" class="txt">- pool: Pool</text>
  <text x="840" y="292" class="txt">implements IStorage</text>

  <rect x="360" y="360" width="390" height="280" class="box" fill="#f8cecc"/>
  <text x="380" y="385" class="title">CartService</text>
  <text x="380" y="412" class="txt">- storage: IStorage</text>
  <text x="380" y="438" class="txt">+ listProducts(), createProduct()</text>
  <text x="380" y="458" class="txt">+ addItem(), removeItem(), removeItemQuantity()</text>
  <text x="380" y="478" class="txt">+ getCart(), getCartTotal()</text>
  <text x="380" y="498" class="txt">+ cancelCart(), checkout()</text>

  <rect x="820" y="430" width="320" height="260" class="box" fill="#e1d5e7"/>
  <text x="840" y="455" class="title">CartController</text>
  <text x="840" y="482" class="txt">- service: CartService</text>
  <text x="840" y="508" class="txt">+ listProducts(), createProduct()</text>
  <text x="840" y="528" class="txt">+ getCart(), getCartTotal()</text>
  <text x="840" y="548" class="txt">+ addItem(), decreaseItem()</text>
  <text x="840" y="568" class="txt">+ removeItem(), cancelCart(), checkout()</text>

  <rect x="1190" y="510" width="170" height="90" class="box" fill="#f5f5f5"/>
  <text x="1210" y="540" class="title">cartRoutes</text>
  <text x="1210" y="560" class="txt">createCartRouter()</text>

  <line x1="820" y1="120" x2="750" y2="120" class="edge"/>
  <text x="760" y="110" class="label">implements</text>

  <line x1="820" y1="280" x2="750" y2="220" class="edge"/>
  <text x="760" y="250" class="label">implements</text>

  <line x1="560" y1="360" x2="560" y2="300" class="edge"/>
  <text x="570" y="330" class="label">depends on (DIP)</text>

  <line x1="820" y1="500" x2="750" y2="500" class="edge"/>
  <text x="760" y="490" class="label">uses</text>

  <line x1="1190" y1="555" x2="1140" y2="555" class="edge"/>
  <text x="1148" y="545" class="label">binds endpoints</text>

  <line x1="820" y1="100" x2="310" y2="100" class="edge"/>
  <text x="470" y="90" class="label">manipulates Product</text>
</svg>
