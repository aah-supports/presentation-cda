<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDA - Exemples de projet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css" />
  <link rel="stylesheet" href="assets/theme.css" />

  <style>
    .badge { display: inline-block; padding: 6px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--cyan); font-size: 0.62em; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
    .lead { font-size: .95em; color: var(--text); }
    .muted { color: var(--muted); }
    .small { font-size: .72em; }
    .xsmall { font-size: .62em; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .card h3 { font-size: .8em; margin: 0 0 8px; color: var(--cyan); }
    .card p { margin: 0; font-size: .72em; }

    .img-wrap { background: #0f1720; border: 1px solid var(--border); border-radius: 10px; padding: 8px; }
    .img-wrap img { width: 100%; height: auto; display: block; border-radius: 6px; }

    .table { width: 100%; border-collapse: collapse; font-size: .6em; }
    .table th, .table td { border: 1px solid var(--border); padding: 6px 8px; vertical-align: top; }
    .table th { color: var(--cyan); font-weight: 700; }

    .term-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
    .term { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
    .term b { color: var(--cyan); display: block; margin-bottom: 4px; font-size: .9em; }
    .term span { font-size: .76em; color: var(--body); }

    .global-progress { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: #1a1a1a; z-index: 100; }
    .global-progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--cyan), var(--purple), var(--orange)); transition: width .35s ease; }

    @media (max-width: 980px) {
      .grid-2, .grid-3, .term-grid { grid-template-columns: 1fr; }
    }
  
    .home-link { position: fixed; top: 10px; right: 14px; z-index: 120; text-decoration: none; font-weight: 700; font-size: 0.62em; color: #0b0b0b; background: linear-gradient(90deg, var(--cyan), var(--green)); padding: 8px 12px; border-radius: 999px; border: 1px solid #0f172a; }
    .home-link:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <div class="global-progress" aria-hidden="true"><div class="global-progress-fill" id="globalProgressFill"></div></div>
  <a class="home-link" href="index.html">Accueil</a>
  <div class="reveal">
    <div class="slides" id="slidesRoot">
      <section>
        <span class="badge">CDA</span>
        <h1>Exemples de projet</h1>
        <p class="lead">Source: <code>supports/08_chap-projet.md</code></p>
        <div class="end-actions"><a class="menu-button" href="index.html">Retour index</a></div>
      </section>
<section>
        <h2>Exemples d'applications</h2>
        <div class="grid-2 small">
          <div class="card">
            <h3>Symfony backend</h3>
            <p>API REST, Doctrine ORM, JWT, gestion des profils et recherche.</p>
          </div>
          <div class="card">
            <h3>React + Symfony</h3>
            <p>Front dynamique, consommation API, auth JWT, recherche temps réel.</p>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
  <script>
    const deck = new Reveal();
    deck.initialize({ hash:true, controls:true, progress:false, slideNumber:true, center:false, transition:'fade', backgroundTransition:'fade' });
    const fill = document.getElementById('globalProgressFill');
    const update = () => {
      const total = Math.max(1, deck.getTotalSlides() - 1);
      const index = deck.getSlidePastCount();
      fill.style.width = `${(index/total)*100}%`;
    };
    deck.on('ready', update);
    deck.on('slidechanged', update);
  </script>

</body>
</html>
