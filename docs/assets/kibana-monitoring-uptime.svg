<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Kibana Monitoring - Uptime & Availability</title>
  <desc id="desc">Mock uptime dashboard with checks and status timeline for website availability.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07131f"/>
      <stop offset="100%" stop-color="#172a3f"/>
    </linearGradient>
    <style>
      .panel{fill:#0f1c2f;stroke:#2c3f5f;stroke-width:1.1;rx:15}
      .title{fill:#eff6ff;font:700 25px 'SF Pro Display',Arial,sans-serif}
      .label{fill:#9eb3cf;font:500 18px 'SF Pro Text',Arial,sans-serif}
      .value{fill:#f8fafc;font:700 44px 'SF Pro Display',Arial,sans-serif}
      .ok{fill:#4ade80;font:700 17px 'SF Pro Text',Arial,sans-serif}
      .warn{fill:#f59e0b;font:700 17px 'SF Pro Text',Arial,sans-serif}
      .axis{stroke:#2e4365;stroke-width:1}
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#bg2)"/>
  <rect x="24" y="22" width="1392" height="64" class="panel"/>
  <text x="52" y="62" class="title">Kibana Uptime - Website synthetic checks</text>
  <text x="1072" y="62" class="label">Period: last 7 days</text>

  <rect x="24" y="100" width="332" height="160" class="panel"/>
  <text x="48" y="148" class="label">Global Availability</text>
  <text x="48" y="212" class="value">99.94%</text>
  <text x="48" y="242" class="ok">Within target (&gt; 99.90%)</text>

  <rect x="372" y="100" width="332" height="160" class="panel"/>
  <text x="396" y="148" class="label">Failed Checks</text>
  <text x="396" y="212" class="value">27</text>
  <text x="396" y="242" class="warn">Mostly on /checkout endpoint</text>

  <rect x="720" y="100" width="332" height="160" class="panel"/>
  <text x="744" y="148" class="label">p95 Availability Latency</text>
  <text x="744" y="212" class="value">724 ms</text>
  <text x="744" y="242" class="ok">No sustained degradation</text>

  <rect x="1068" y="100" width="348" height="160" class="panel"/>
  <text x="1092" y="148" class="label">SSL Certificate</text>
  <text x="1092" y="212" class="value">14 days</text>
  <text x="1092" y="242" class="warn">Renewal reminder active</text>

  <rect x="24" y="280" width="936" height="596" class="panel"/>
  <text x="48" y="322" class="title">HTTP Monitor Status Timeline</text>
  <line x1="72" y1="830" x2="930" y2="830" class="axis"/>

