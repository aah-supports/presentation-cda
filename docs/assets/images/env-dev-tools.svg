<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-label="Repere Kibana Dev Tools">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="800" fill="url(#bg)"/>
  <rect x="20" y="20" width="1360" height="760" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2"/>

  <rect x="20" y="20" width="1360" height="48" rx="14" fill="#111827"/>
  <circle cx="50" cy="44" r="7" fill="#ef4444"/>
  <circle cx="72" cy="44" r="7" fill="#f59e0b"/>
  <circle cx="94" cy="44" r="7" fill="#22c55e"/>
  <text x="120" y="49" font-family="Arial, sans-serif" font-size="18" fill="#cbd5e1">Kibana - Dev Tools</text>

  <rect x="40" y="84" width="250" height="676" rx="10" fill="#0b1220" stroke="#263245"/>
  <text x="60" y="120" font-family="Arial, sans-serif" font-size="22" fill="#93c5fd">Menu</text>
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="19" fill="#94a3b8">Discover</text>
  <text x="60" y="210" font-family="Arial, sans-serif" font-size="19" fill="#94a3b8">Dashboards</text>
  <rect x="48" y="238" width="234" height="42" rx="8" fill="#1d4ed8"/>
  <text x="60" y="266" font-family="Arial, sans-serif" font-size="19" fill="#eff6ff">Dev Tools (ici)</text>

  <rect x="320" y="84" width="510" height="320" rx="10" fill="#0a0f1a" stroke="#334155"/>
  <text x="340" y="116" font-family="Arial, sans-serif" font-size="20" fill="#93c5fd">Console de requetes</text>
  <text x="340" y="160" font-family="Courier New, monospace" font-size="24" fill="#d1fae5">GET demo_env/_search</text>
  <text x="340" y="198" font-family="Courier New, monospace" font-size="24" fill="#d1fae5">{</text>
  <text x="370" y="236" font-family="Courier New, monospace" font-size="24" fill="#d1fae5">"sort": [{"created_at": "desc"}]</text>
  <text x="340" y="274" font-family="Courier New, monospace" font-size="24" fill="#d1fae5">}</text>

  <rect x="860" y="84" width="500" height="676" rx="10" fill="#0a0f1a" stroke="#334155"/>
  <text x="882" y="116" font-family="Arial, sans-serif" font-size="20" fill="#93c5fd">Resultat JSON</text>
  <text x="882" y="160" font-family="Courier New, monospace" font-size="20" fill="#e2e8f0">"hits": { "total": { "value": 3 } }</text>
  <text x="882" y="200" font-family="Courier New, monospace" font-size="20" fill="#e2e8f0">"_index": "demo_env"</text>
  <text x="882" y="240" font-family="Courier New, monospace" font-size="20" fill="#e2e8f0">"app": "worker-sync"</text>
  <text x="882" y="280" font-family="Courier New, monospace" font-size="20" fill="#e2e8f0">"level": "ERROR"</text>
  <text x="882" y="320" font-family="Courier New, monospace" font-size="20" fill="#e2e8f0">"message": "Timeout base externe"</text>

  <rect x="330" y="430" width="760" height="110" rx="10" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <text x="356" y="477" font-family="Arial, sans-serif" font-size="28" fill="#86efac">Validation: si total.value = 3, l ingestion Elasticsearch fonctionne.</text>
  <text x="356" y="515" font-family="Arial, sans-serif" font-size="22" fill="#bbf7d0">Tu vois les donnees directement dans la console Dev Tools.</text>
</svg>
