<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .entity { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; }
      .head { fill: #e2e8f0; stroke: #0f172a; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 2; }
      .title { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .txt { font: 15px Arial, sans-serif; fill: #1f2937; }
      .card { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .legend { font: 14px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="720"/>
  <text x="40" y="46" class="title">MCD - Application Films d'art et essai (MERISE)</text>
  <text x="40" y="70" class="legend">Vocabulaire: entite, association, cardinalite, identifiant, attribut</text>

  <g transform="translate(80,120)">
    <rect class="entity" x="0" y="0" width="260" height="170" rx="8"/>
    <rect class="head" x="0" y="0" width="260" height="44" rx="8"/>
    <text x="18" y="29" class="title">Film</text>
    <text x="18" y="74" class="txt">* id_film : Identifiant</text>
    <text x="18" y="102" class="txt">titre : Attribut</text>
    <text x="18" y="130" class="txt">annee_sortie : Attribut</text>
    <text x="18" y="158" class="txt">synopsis : Attribut</text>
  </g>

  <g transform="translate(500,120)">
    <rect class="entity" x="0" y="0" width="260" height="130" rx="8"/>
    <rect class="head" x="0" y="0" width="260" height="44" rx="8"/>
    <text x="18" y="29" class="title">Realisateur</text>
    <text x="18" y="76" class="txt">* id_realisateur : Identifiant</text>
    <text x="18" y="104" class="txt">nom : Attribut</text>
  </g>

  <g transform="translate(900,120)">
    <rect class="entity" x="0" y="0" width="260" height="130" rx="8"/>
    <rect class="head" x="0" y="0" width="260" height="44" rx="8"/>
    <text x="18" y="29" class="title">Genre</text>
    <text x="18" y="76" class="txt">* id_genre : Identifiant</text>
    <text x="18" y="104" class="txt">libelle : Attribut</text>
  </g>

  <g transform="translate(260,430)">
    <rect class="entity" x="0" y="0" width="260" height="130" rx="8"/>
    <rect class="head" x="0" y="0" width="260" height="44" rx="8"/>
    <text x="18" y="29" class="title">Utilisateur</text>
    <text x="18" y="76" class="txt">* id_utilisateur : Identifiant</text>
    <text x="18" y="104" class="txt">pseudo : Attribut</text>
  </g>

  <g transform="translate(700,400)">
    <rect class="entity" x="0" y="0" width="300" height="170" rx="8"/>
    <rect class="head" x="0" y="0" width="300" height="44" rx="8"/>
    <text x="18" y="29" class="title">Avis</text>
    <text x="18" y="74" class="txt">* id_avis : Identifiant</text>
    <text x="18" y="102" class="txt">note : Attribut</text>
    <text x="18" y="130" class="txt">commentaire : Attribut</text>
    <text x="18" y="158" class="txt">date_publication : Attribut</text>
  </g>

  <line class="line" x1="340" y1="205" x2="500" y2="185"/>
  <text x="388" y="176" class="card">0,n</text>
  <text x="458" y="172" class="card">1,1</text>
  <text x="375" y="202" class="legend">Realiser</text>

  <line class="line" x1="760" y1="190" x2="900" y2="190"/>
  <text x="800" y="178" class="card">0,n</text>
  <text x="852" y="178" class="card">0,n</text>
  <text x="812" y="207" class="legend">Classer</text>

  <line class="line" x1="340" y1="290" x2="770" y2="455"/>
  <text x="415" y="330" class="card">1,1</text>
  <text x="690" y="435" class="card">0,n</text>
  <text x="520" y="375" class="legend">Recevoir</text>

  <line class="line" x1="520" y1="495" x2="700" y2="495"/>
  <text x="560" y="482" class="card">1,1</text>
  <text x="656" y="482" class="card">0,n</text>
  <text x="595" y="515" class="legend">Publier</text>
</svg>
