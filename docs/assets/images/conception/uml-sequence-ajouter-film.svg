<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .return { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; marker-end: url(#arrow2); }
      .life { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; }
      .box { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; }
      .alt { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; }
      .title { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .txt { font: 14px Arial, sans-serif; fill: #1f2937; }
      .lbl { font: 700 13px Arial, sans-serif; fill: #0f172a; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="720"/>
  <text x="40" y="46" class="title">UML - Diagramme de sequence: Ajouter un film</text>

  <g>
    <rect class="box" x="70" y="80" width="170" height="46" rx="8"/>
    <text x="112" y="109" class="txt">Administrateur</text>
    <line class="life" x1="155" y1="126" x2="155" y2="660"/>

    <rect class="box" x="300" y="80" width="170" height="46" rx="8"/>
    <text x="326" y="109" class="txt">FilmController</text>
    <line class="life" x1="385" y1="126" x2="385" y2="660"/>

    <rect class="box" x="530" y="80" width="150" height="46" rx="8"/>
    <text x="566" y="109" class="txt">FilmService</text>
    <line class="life" x1="605" y1="126" x2="605" y2="660"/>

    <rect class="box" x="740" y="80" width="190" height="46" rx="8"/>
    <text x="770" y="109" class="txt">FilmRepository</text>
    <line class="life" x1="835" y1="126" x2="835" y2="660"/>

    <rect class="box" x="1010" y="80" width="160" height="46" rx="8"/>
    <text x="1061" y="109" class="txt">PostgreSQL</text>
    <line class="life" x1="1090" y1="126" x2="1090" y2="660"/>
  </g>

  <line class="line" x1="155" y1="170" x2="385" y2="170"/>
  <text x="206" y="160" class="txt">POST /api/films</text>

  <line class="line" x1="385" y1="220" x2="605" y2="220"/>
  <text x="438" y="210" class="txt">createFilm(payload)</text>

  <line class="line" x1="605" y1="270" x2="835" y2="270"/>
  <text x="650" y="260" class="txt">existsByTitleAndYear()</text>

  <line class="line" x1="835" y1="320" x2="1090" y2="320"/>
  <text x="902" y="310" class="txt">SELECT ...</text>

  <line class="return" x1="1090" y1="360" x2="835" y2="360"/>
  <text x="930" y="350" class="txt">found / not found</text>

  <rect class="alt" x="520" y="390" width="620" height="215" rx="8"/>
  <text x="540" y="415" class="lbl">alt deja existant</text>
  <line class="return" x1="605" y1="440" x2="385" y2="440"/>
  <text x="445" y="430" class="txt">409 Conflict</text>

  <text x="540" y="490" class="lbl">else nouveau film</text>
  <line class="line" x1="605" y1="520" x2="835" y2="520"/>
  <text x="685" y="510" class="txt">save(film)</text>
  <line class="line" x1="835" y1="560" x2="1090" y2="560"/>
  <text x="925" y="550" class="txt">INSERT film</text>
  <line class="return" x1="1090" y1="600" x2="385" y2="600"/>
  <text x="700" y="590" class="txt">201 Created + FilmDTO</text>
</svg>
