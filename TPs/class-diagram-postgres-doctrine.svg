<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-label="Class diagram postgres doctrine api platform">
  <defs>
    <style>
      .bg { fill: #0b0f14; }
      .title { fill: #e6f1ff; font: 700 26px Arial, sans-serif; }
      .subtitle { fill: #8fb3d9; font: 400 15px Arial, sans-serif; }
      .box { fill: #111a24; stroke: #2f4f6f; stroke-width: 2; rx: 10; }
      .head { fill: #16324a; }
      .name { fill: #9ad1ff; font: 700 18px Arial, sans-serif; }
      .txt { fill: #d7e7f7; font: 400 14px 'Courier New', monospace; }
      .pk { fill: #7dd3fc; font: 700 13px Arial, sans-serif; }
      .fk { fill: #fca5a5; font: 700 13px Arial, sans-serif; }
      .rel { stroke: #9ab6d3; stroke-width: 2; fill: none; }
      .lbl { fill: #bfd4ea; font: 600 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="820"/>
  <text class="title" x="40" y="46">TP 3h - PostgreSQL + Doctrine + API Platform</text>
  <text class="subtitle" x="40" y="72">Schema relationnel cible: contraintes de cles + relations ORM</text>

  <g transform="translate(60,120)">
    <rect class="box" width="340" height="220"/>
    <rect class="head" width="340" height="40"/>
    <text class="name" x="14" y="26">movie</text>
    <text class="pk" x="14" y="62">PK</text><text class="txt" x="48" y="62">id UUID</text>
    <text class="txt" x="14" y="86">title VARCHAR(150) NOT NULL</text>
    <text class="txt" x="14" y="110">slug VARCHAR(180) UNIQUE NOT NULL</text>
    <text class="txt" x="14" y="134">release_year SMALLINT CHECK >= 1888</text>
    <text class="txt" x="14" y="158">duration_minutes SMALLINT CHECK > 0</text>
    <text class="txt" x="14" y="182">created_at TIMESTAMPTZ DEFAULT now()</text>
  </g>

  <g transform="translate(500,120)">
    <rect class="box" width="300" height="165"/>
    <rect class="head" width="300" height="40"/>
    <text class="name" x="14" y="26">genre</text>
    <text class="pk" x="14" y="62">PK</text><text class="txt" x="48" y="62">id SERIAL</text>
    <text class="txt" x="14" y="86">code VARCHAR(20) UNIQUE NOT NULL</text>
    <text class="txt" x="14" y="110">label VARCHAR(100) UNIQUE NOT NULL</text>
  </g>

  <g transform="translate(450,360)">
    <rect class="box" width="340" height="145"/>
    <rect class="head" width="340" height="40"/>
    <text class="name" x="14" y="26">movie_genre</text>
    <text class="pk" x="14" y="62">PK</text><text class="txt" x="48" y="62">(movie_id, genre_id)</text>
    <text class="fk" x="14" y="86">FK</text><text class="txt" x="48" y="86">movie_id -> movie.id</text>
    <text class="fk" x="14" y="110">FK</text><text class="txt" x="48" y="110">genre_id -> genre.id</text>
  </g>

  <g transform="translate(900,120)">
    <rect class="box" width="300" height="170"/>
    <rect class="head" width="300" height="40"/>
    <text class="name" x="14" y="26">person</text>
    <text class="pk" x="14" y="62">PK</text><text class="txt" x="48" y="62">id UUID</text>
    <text class="txt" x="14" y="86">full_name VARCHAR(150) NOT NULL</text>
    <text class="txt" x="14" y="110">birth_date DATE NULL</text>
    <text class="txt" x="14" y="134">UNIQUE(full_name, birth_date)</text>
  </g>

  <g transform="translate(860,380)">
    <rect class="box" width="360" height="185"/>
    <rect class="head" width="360" height="40"/>
    <text class="name" x="14" y="26">casting</text>
    <text class="pk" x="14" y="62">PK</text><text class="txt" x="48" y="62">id BIGSERIAL</text>
    <text class="fk" x="14" y="86">FK</text><text class="txt" x="48" y="86">movie_id -> movie.id</text>
    <text class="fk" x="14" y="110">FK</text><text class="txt" x="48" y="110">person_id -> person.id</text>
    <text class="txt" x="14" y="134">role_name VARCHAR(80) NOT NULL</text>
    <text class="txt" x="14" y="158">billing_order SMALLINT CHECK > 0</text>
  </g>

  <path class="rel" d="M230 340 L230 432 L450 432"/>
  <text class="lbl" x="252" y="420">1..N</text>

  <path class="rel" d="M650 285 L650 360"/>
  <text class="lbl" x="662" y="332">1..N</text>

  <path class="rel" d="M400 230 L500 230"/>
  <text class="lbl" x="430" y="220">N..N via movie_genre</text>

  <path class="rel" d="M980 290 L980 420"/>
  <text class="lbl" x="992" y="360">1..N</text>

  <path class="rel" d="M1060 290 L1060 420"/>
  <text class="lbl" x="1072" y="360">1..N</text>

  <path class="rel" d="M400 210 L860 210"/>
  <text class="lbl" x="600" y="196">movie <-> person via casting</text>
</svg>
