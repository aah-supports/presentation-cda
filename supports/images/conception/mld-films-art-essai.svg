<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .tbl { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; }
      .head { fill: #dbeafe; stroke: #0f172a; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .title { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .txt { font: 14px Arial, sans-serif; fill: #1f2937; }
      .fk { font: 700 14px Arial, sans-serif; fill: #b91c1c; }
      .pk { font: 700 14px Arial, sans-serif; fill: #1d4ed8; }
      .legend { font: 14px Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="720"/>
  <text x="40" y="46" class="title">MLD - Application Films d'art et essai (relationnel)</text>
  <text x="40" y="70" class="legend">Vocabulaire: table, cle primaire, cle etrangere</text>

  <g transform="translate(60,120)">
    <rect class="tbl" x="0" y="0" width="250" height="130" rx="8"/>
    <rect class="head" x="0" y="0" width="250" height="36" rx="8"/>
    <text x="12" y="24" class="title">realisateur</text>
    <text x="12" y="60" class="pk">PK id_realisateur</text>
    <text x="12" y="86" class="txt">nom</text>
  </g>

  <g transform="translate(360,100)">
    <rect class="tbl" x="0" y="0" width="280" height="190" rx="8"/>
    <rect class="head" x="0" y="0" width="280" height="36" rx="8"/>
    <text x="12" y="24" class="title">film</text>
    <text x="12" y="62" class="pk">PK id_film</text>
    <text x="12" y="88" class="txt">titre</text>
    <text x="12" y="114" class="txt">annee_sortie</text>
    <text x="12" y="140" class="txt">synopsis</text>
    <text x="12" y="166" class="fk">FK id_realisateur</text>
  </g>

  <g transform="translate(700,120)">
    <rect class="tbl" x="0" y="0" width="220" height="130" rx="8"/>
    <rect class="head" x="0" y="0" width="220" height="36" rx="8"/>
    <text x="12" y="24" class="title">genre</text>
    <text x="12" y="60" class="pk">PK id_genre</text>
    <text x="12" y="86" class="txt">libelle</text>
  </g>

  <g transform="translate(980,120)">
    <rect class="tbl" x="0" y="0" width="240" height="130" rx="8"/>
    <rect class="head" x="0" y="0" width="240" height="36" rx="8"/>
    <text x="12" y="24" class="title">film_genre</text>
    <text x="12" y="60" class="pk">PK/FK id_film</text>
    <text x="12" y="86" class="pk">PK/FK id_genre</text>
  </g>

  <g transform="translate(220,420)">
    <rect class="tbl" x="0" y="0" width="240" height="130" rx="8"/>
    <rect class="head" x="0" y="0" width="240" height="36" rx="8"/>
    <text x="12" y="24" class="title">utilisateur</text>
    <text x="12" y="60" class="pk">PK id_utilisateur</text>
    <text x="12" y="86" class="txt">pseudo</text>
  </g>

  <g transform="translate(560,390)">
    <rect class="tbl" x="0" y="0" width="320" height="190" rx="8"/>
    <rect class="head" x="0" y="0" width="320" height="36" rx="8"/>
    <text x="12" y="24" class="title">avis</text>
    <text x="12" y="62" class="pk">PK id_avis</text>
    <text x="12" y="88" class="txt">note</text>
    <text x="12" y="114" class="txt">commentaire</text>
    <text x="12" y="140" class="fk">FK id_film</text>
    <text x="12" y="166" class="fk">FK id_utilisateur</text>
  </g>

  <line class="line" x1="310" y1="182" x2="360" y2="182"/>
  <text x="296" y="170" class="legend">1,n</text>
  <line class="line" x1="640" y1="186" x2="980" y2="186"/>
  <line class="line" x1="920" y1="186" x2="980" y2="186"/>
  <text x="770" y="172" class="legend">n,n via table associative</text>

  <line class="line" x1="500" y1="290" x2="670" y2="390"/>
  <text x="518" y="330" class="legend">1,n</text>
  <line class="line" x1="460" y1="485" x2="560" y2="485"/>
  <text x="482" y="472" class="legend">1,n</text>
</svg>
