<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .node { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; }
      .decision { fill: #ede9fe; stroke: #4338ca; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .title { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .txt { font: 14px Arial, sans-serif; fill: #1f2937; text-anchor: middle; }
      .label { font: 13px Arial, sans-serif; fill: #0f172a; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="720"/>
  <text x="40" y="46" class="title">UML - Diagramme d'activite: Poster un avis</text>

  <circle cx="640" cy="95" r="16" fill="#0f172a"/>

  <rect class="node" x="500" y="135" width="280" height="56" rx="8"/>
  <text x="640" y="170" class="txt">Utilisateur soumet un avis</text>

  <rect class="node" x="500" y="225" width="280" height="56" rx="8"/>
  <text x="640" y="260" class="txt">Verifier authentification</text>

  <polygon class="decision" points="640,320 700,370 640,420 580,370"/>
  <text x="640" y="375" class="txt">Authentifie ?</text>

  <rect class="node" x="850" y="342" width="260" height="56" rx="8"/>
  <text x="980" y="377" class="txt">Retourner erreur 401</text>

  <rect class="node" x="440" y="455" width="400" height="56" rx="8"/>
  <text x="640" y="490" class="txt">Verifier note / commentaire</text>

  <polygon class="decision" points="640,540 700,590 640,640 580,590"/>
  <text x="640" y="595" class="txt">Valide ?</text>

  <rect class="node" x="860" y="562" width="250" height="56" rx="8"/>
  <text x="985" y="597" class="txt">Retourner erreur 422</text>

  <rect class="node" x="170" y="562" width="260" height="56" rx="8"/>
  <text x="300" y="597" class="txt">Enregistrer avis (201)</text>

  <circle cx="300" cy="665" r="14" fill="#0f172a"/>
  <circle cx="980" cy="665" r="14" fill="#0f172a"/>

  <line class="line" x1="640" y1="111" x2="640" y2="135"/>
  <line class="line" x1="640" y1="191" x2="640" y2="225"/>
  <line class="line" x1="640" y1="281" x2="640" y2="320"/>
  <line class="line" x1="700" y1="370" x2="850" y2="370"/>
  <text x="760" y="355" class="label">non</text>
  <line class="line" x1="640" y1="420" x2="640" y2="455"/>
  <text x="652" y="445" class="label">oui</text>
  <line class="line" x1="640" y1="511" x2="640" y2="540"/>
  <line class="line" x1="580" y1="590" x2="430" y2="590"/>
  <text x="500" y="575" class="label">oui</text>
  <line class="line" x1="700" y1="590" x2="860" y2="590"/>
  <text x="760" y="575" class="label">non</text>
  <line class="line" x1="300" y1="618" x2="300" y2="651"/>
  <line class="line" x1="980" y1="618" x2="980" y2="651"/>
</svg>
